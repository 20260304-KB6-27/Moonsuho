<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div>
        <h2>취미생활</h2>
        <label>
          <input type="checkbox" value="A" v-model="hobby" /> 운동
        </label>
        <label>
          <input type="checkbox" value="B" v-model="hobby" /> 독서
        </label>
        <label>
          <input type="checkbox" value="C" v-model="hobby" /> 음악
        </label>
        <label>
          <input type="checkbox" value="D" v-model="hobby" /> 댄스
        </label>
        <label>
          <input type="checkbox" value="E" v-model="hobby" /> 역사
        </label>
      </div>
      <div>
        <h2>상품 분류 선택</h2>
        <select v-model="category">
          <option>레저</option>
          <option>가전</option>
          <option>음식</option>
          <option>도서</option>
          <option>주방</option>
        </select>
      </div>
      <hr />
      <div>
        선택한 취미:{{hobby.join(',')}}
        <br />
        선택한 상품 분류: {{category}}
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        setup() {
          return {
            hobby: [],
            category: '',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
