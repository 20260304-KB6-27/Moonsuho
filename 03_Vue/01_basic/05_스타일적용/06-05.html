<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayout {
        text-align: center;
        width: 120px;
      }
      .staticBorder {
        /* 경계선 카키색 점선 굵기 1px  */
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div>
        <button class="staticBorder" :class="myColor">테스트 버튼</button>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const myColor = ref('buttonColor buttonLayout');

          return {
            myColor,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
