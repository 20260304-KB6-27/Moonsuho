<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- 이벤트 버블링: 이벤트가 발생한 요소에서 부모요소로 전파되느 현상 -->
      <div @click="parentClick">
        <a href="https://facebook.com" @click="childClick">페이스북</a>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        setup() {
          const parentClick = (e) => {
            //e.target: 이벤트가 발생한 요소
            //e.currentTarget: 이벤트 리스너가 부착된 요소
            console.log(`이벤트가 발생한 요소: `, e.target.tagName);
            console.log(
              `이벤트 리스너가 부착된 요소: `,
              e.currentTarget.tagName,
            );
            e.preventDefault(); //요소의 기본동작 방지
          };
          const childClick = (e) => {
            console.log('자식 a태그 클릭 이벤트 실행됨');

            //이벤트 버블링 (부모에게 전파되는 것)을 막음
            //버블링을 막음으로써 이벤트 전파를 중단해서
            // 부모이벤트에 preventDefault로 이벤트동작을 막았음에도 불구하고 페이스북으로 이동됨.
            e.stopPropagation();
          };

          return {
            parentClick,
            childClick,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
