<!doctype html>

 1. computed 사용
 2. id자동으로 +되도록 변경
 3. 수정 가능하도록 기능 추가 -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v1</h1>

      <input
        type="text"
        v-model.trim="post_title"
        placeholder="새 게시글 제목"
      />
      <input
        type="text"
        v-model.trim="post_content"
        placeholder="새 게시글 내용"
      />
      <button @click="addPost">작성</button>
      <!-- @click = "selectPost(post)" post정보를 인자로 전달 가능 -->
      <!-- 아래의 목록을 완성하세요 -->
      <ul>
        <li v-for="(post,index) in posts" :key="post.no">
          <div class="post-item" @click="clickToMenu(post)">
            {{post.no}}. {{post.title}}
            <span>{{ selectPost === post ? '▲' : '▼'}}</span>
          </div>

          <!-- 아래의 div를 완성하세요 -->
          <div class="post-content" v-if="selectPost === post">
            <!-- edit 모드 -->
            <!-- <div v-if="selectEditPost === post">
              <input></input>
              <textarea></textarea>
              <button>저장</button>
              <button>취소</button>
            </div> -->
            <!-- read only 모드 -->
            <div v-else>
              <h2>{{selectPost.title}}</h2>
              {{selectPost.content}}
              <br />
              <button @click="editPost(selectPost.no)">수정</button>
              <button @click="deletePost(selectPost.no)">삭제</button>
              <button @click="closePost">닫기</button>
            </div>
          </div>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const posts = ref([
            {
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          // 아래에 화면처럼 동작하도록 구현해보세요
          const selectPost = ref(null);
          const clickToMenu = (post) => {
            if (selectPost.value === post) {
              selectPost.value = null;
            } else {
              selectPost.value = post;
            }
            //삼항연산자
            //selectPost.value = selectPost.value === post ? null : post
          };

          const closePost = () => {
            selectPost.value = null;
          };

          //게시글 추가
          const post_title = ref('');
          const post_content = ref('');
          const addPost = (e) => {
            if (post_title.value === '' || post_content.value === '') return;

            posts.value.push({
              no: '', //가장 최신 post가져와서 no+1?
              title: post_title.value,
              content: post_content.value,
            });
          };

          //게시글 삭제
          const deletePost = (no) => {
            //findIndext(콜백) : 콜백함수가 true를 반환하는 첫번째 요소의 인덱스를 반환
            let index = posts.value.findIndex((item) => no === item.no);
            if (confirm('정말로 삭제하시겠습니까?')) {
              //splice(인덱스, 삭제할 요소의 갯수) : 인덱스부터 갯수만큼 배열의 요소를 삭제
              posts.value.splice(index, 1);
            }
          };

          //게시글 수정
          const selectEditPost = ref(null);
          const editPost = (no) => {};

          return {
            posts,
            selectPost,
            clickToMenu,
            closePost,
            post_title,
            post_content,
            addPost,
            deletePost,
            editPost,
          };
        },
      }).mount('#app');
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </body>
</html>
